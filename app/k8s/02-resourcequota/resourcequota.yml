---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: devsecops-resources-development-app
  namespace: development-app
spec:
  hard:
    requests.cpu: "1"
    requests.memory: 3Gi
    limits.cpu: "5"
    limits.memory: 5Gi
    pods: "10"
    services: "5"
    services.loadbalancers: "1"
    count/deployments.app: "5"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: devsecops-resources-development-db
  namespace: development-db
spec:
  hard:
    requests.cpu: 50m
    requests.memory: 500Mi
    limits.cpu: 1500m
    limits.memory: 1.5Gi
    persistentvolumeclaims: "4"
    requests.storage: 2Gi