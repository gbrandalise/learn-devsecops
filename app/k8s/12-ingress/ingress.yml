---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress-devsecops
  namespace: ${NAMESPACE}-app
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"  # Habilita regex no path
    nginx.ingress.kubernetes.io/rewrite-target: /$1  # Reescreve para
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: /en/(.*)  # Captura: $1 = resto da URL
        pathType: ImplementationSpecific # Prefix, Exact, ImplementationSpecific = Regex
        backend:
          service:
            name: devsecops-app-nodeport
            port:
              number: 8080
      - path: /pt/(.*)  # Captura: $1 = resto da URL
        pathType: ImplementationSpecific # Prefix, Exact, ImplementationSpecific = Regex
        backend:
          service:
            name: devsecops-pt-nodeport
            port:
              number: 8082
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress-devsecops-default
  namespace: ${NAMESPACE}-app
spec:
  ingressClassName: nginx
  defaultBackend:
    service:
      name: devsecops-app-nodeport
      port:
        number: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress-devsecops-subdomain
  namespace: ${NAMESPACE}-app
spec:
  ingressClassName: nginx
  rules:
  - host: en.127.0.0.1.nip.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: devsecops-app-nodeport
            port:
              number: 8080
  - host: pt.127.0.0.1.nip.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: devsecops-pt-nodeport
            port:
              number: 8082