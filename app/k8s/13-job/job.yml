apiVersion: batch/v1
kind: Job
metadata:
  name: devsecops-job
  namespace: ${NAMESPACE}-app
spec:
  ttlSecondsAfterFinished: 60
  template:
    metadata:
      labels:
        app: devsecops-job
    spec:
      containers:
      - name: devsecops-job
        image: ghcr.io/gbrandalise/learn-devsecops:latest
        command:
        - java
        - -jar
        - /app/app.jar
        args:
        - "job"
      restartPolicy: Never